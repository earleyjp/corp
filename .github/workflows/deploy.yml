name: GitHub Pages へのデプロイ

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js の準備
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 依存パッケージのインストール
        run: npm install --prefer-offline --no-audit

      - name: ビルド
        run: npm run build

      - name: アーティファクトのアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: GitHub Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
